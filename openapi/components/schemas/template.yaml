      example: ws_1234567890
    id:
      type: string
      description: ID of the template to update
      example: welcome_email
      maxLength: 32
    name:
      type: string
      description: Name of the template
      example: Welcome Email
      maxLength: 32
    channel:
      type: string
      enum:
        - email
        - web
      description: Communication channel
      example: email
    email:
      $ref: '#/EmailTemplate'
    web:
      $ref: '#/WebTemplate'
    category:
      type: string
      enum:
        - marketing
        - transactional
        - welcome
        - opt_in
        - unsubscribe
        - bounce
        - blocklist
        - blog
        - other
      description: Template category
      example: transactional
    template_macro_id:
      type: string
      nullable: true
      description: ID of the template macro (layout) to use
    test_data:
      type: object
      additionalProperties: true
      description: Test data for template preview
    settings:
      type: object
      additionalProperties: true
      description: Channel-specific settings
    translations:
      type: object
      additionalProperties:
        type: object
        additionalProperties: true
      description: Per-locale translation key-value maps
    default_language:
      type: string
      nullable: true
      description: Override the workspace default language for this template
      maxLength: 10

DeleteTemplateRequest:
  type: object
  required:
    - workspace_id
    - id
  properties:
    workspace_id:
      type: string
      description: The ID of the workspace
      example: ws_1234567890
    id:
      type: string
      description: ID of the template to delete
      example: welcome_email

CompileTemplateRequest:
  type: object
  required:
    - workspace_id
    - message_id
    - visual_editor_tree
  properties:
    workspace_id:
      type: string
      description: The ID of the workspace
      example: ws_1234567890
    message_id:
      type: string
      description: Unique message ID for tracking
      example: msg_abc123
    visual_editor_tree:
      type: object
      description: MJML visual editor tree structure (must have type 'mjml')
      additionalProperties: true
    test_data:
      type: object
      description: Data to use for Liquid templating
      additionalProperties: true
      example:
        user_name: John Doe
        action_url: https://example.com/action
    tracking_settings:
      $ref: '#/TrackingSettings'
    channel:
      type: string
      enum:
        - email
        - web
      description: Channel filter for block visibility
    translations:
      type: object
      additionalProperties: true
      description: Merged translations map for a specific locale, used by the Liquid `t` filter during compilation

CompileTemplateResponse:
  type: object
  properties:
    success:
      type: boolean
      description: Whether compilation was successful
    mjml:
      type: string
      description: Generated MJML markup
    html:
      type: string
      description: Compiled HTML output
    error:
      type: object
      description: MJML compilation error details, if any
      properties:
        message:
          type: string

TrackingSettings:
  type: object
  properties:
    enable_tracking:
      type: boolean
      description: Whether to enable click/open tracking
    endpoint:
      type: string
      description: API endpoint for tracking redirects
    utm_source:
      type: string
      description: UTM source parameter
    utm_medium:
      type: string
      description: UTM medium parameter
    utm_campaign:
      type: string
      description: UTM campaign parameter
    utm_content:
      type: string
      description: UTM content parameter
    utm_term:
      type: string
      description: UTM term parameter
    workspace_id:
      type: string
      description: Workspace ID for tracking
    message_id:
      type: string
      description: Message ID for tracking
