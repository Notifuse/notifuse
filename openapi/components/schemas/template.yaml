  type: object
  required:
    - workspace_id
    - id
    - name
    - channel
    - category
  properties:
    workspace_id:
      type: string
      description: The ID of the workspace
      example: ws_1234567890
    id:
      type: string
      description: Unique identifier for the template (alphanumeric, underscores, and hyphens only)
      example: welcome_email
      maxLength: 32
      pattern: ^[a-zA-Z0-9_-]+$
    name:
      type: string
      description: Name of the template
      example: Welcome Email
      maxLength: 32
    channel:
      type: string
      enum:
        - email
        - web
      description: Communication channel
      example: email
    email:
      $ref: '#/EmailTemplate'
    web:
      $ref: '#/WebTemplate'
    category:
      type: string
      enum:
        - marketing
        - transactional
        - welcome
        - opt_in
        - unsubscribe
        - bounce
        - blocklist
        - blog
        - other
      description: Template category
      example: transactional
    template_macro_id:
      type: string
      nullable: true
      description: ID of the template macro (layout) to use
    test_data:
      type: object
      additionalProperties: true
      description: Test data for template preview
    settings:
      type: object
      additionalProperties: true
      description: Channel-specific settings
    translations:
      type: object
      additionalProperties:
        type: object
        additionalProperties: true
      description: Per-locale translation key-value maps
    default_language:
      type: string
      nullable: true
      description: Override the workspace default language for this template
      maxLength: 10

